<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - University Portal</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    </head>
    <body class="d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">

                <!-- Header -->
                <div class="text-center mb-5">
                    <div class="d-inline-flex align-items-center gap-3 bg-white bg-opacity-10 backdrop-blur rounded-4 px-5 py-3 border border-teal-400 border-opacity-30">
                        <i class="fa-solid fa-graduation-cap fa-3x text-cyan-400"></i>
                        <div>
                            <h1 class="header-font display-5 fw-bold text-white mb-1">University Registration</h1>
                            <p class="text-teal-200 mb-0">Academic Year 2026-27</p>
                        </div>
                    </div>
                </div>

                <!-- Form Card -->
                <div id="form-card" class="form-container rounded-4 shadow-lg overflow-hidden">
                    <div class="p-5 p-md-6">
                        <form id="registrationForm" class="needs-validation" novalidate>
                            <!-- All fields (Personal Info, DOB, Course, Emails, Years, Residence, Subjects, Agreement) remain the same -->
                            <!-- ... (full form content is in the file) ... -->
                            <!-- Personal Info -->
                            <h4 class="mb-4 text-teal-700 d-flex align-items-center gap-2">
                                <i class="fa-solid fa-user"></i> Personal Information
                            </h4>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">First Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-solid fa-user text-teal-600"></i></span>
                                        <input type="text" class="form-control input-focus" id="firstName" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Last Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-solid fa-user text-teal-600"></i></span>
                                        <input type="text" class="form-control input-focus" id="lastName" required>
                                    </div>
                                </div>
                            </div>
                            <!-- DOB and Course -->
                            <div class="row g-4 mt-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Date of Birth</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-solid fa-calendar text-teal-600"></i></span>
                                        <input type="date" class="form-control input-focus" id="dob" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Course / Program</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-solid fa-book text-teal-600"></i></span>
                                        <select class="form-select input-focus" id="course" required>
                                            <option value="">Select Course</option>
                                            <option value="B.Tech CSE">B.Tech Computer Science</option>
                                            <option value="B.Tech ECE">B.Tech Electronics</option>
                                            <option value="B.Tech M">B.Tech Mechanics</option>
                                            <option value="B.Tech AS">B.Tech Aerospace</option>
                                            <option value="B.Tech CSE (AI/ML)">B.Tech Artificial Intelligence</option>
                                            <option value="B.Tech CSE (DS)">B.Tech Data Science</option>
                                            <option value="B.Tech CSE (CC)">B.Tech Cloud Computing</option>
                                            <option value="B.Tech CSE (CS)">B.Tech Cyber Security</option>
                                            <option value="M.Tech">Integrated M.Tech (Dual Degree)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Emails -->
                            <div class="row g-4 mt-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Personal Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-solid fa-envelope text-teal-600"></i></span>
                                        <input type="email" class="form-control input-focus" id="personalEmail" placeholder="your@email.com" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">University Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-solid fa-envelope text-teal-600"></i></span>
                                        <input type="email" class="form-control input-focus" id="universityEmail" placeholder="student@university.edu" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Academic Years -->
                            <div class="row g-4 mt-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Current Year</label>
                                    <select class="form-select input-focus" id="currentYear" required>
                                        <option value="">Select Year</option>
                                        <option value="1">1st Year</option>
                                        <option value="2">2nd Year</option>
                                        <option value="3">3rd Year</option>
                                        <option value="4">4th Year</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-medium">Graduation Year</label>
                                    <select class="form-select input-focus" id="graduationYear" required>
                                        <option value="">Select Year</option>
                                        <option value="2027">2027</option>
                                        <option value="2028">2028</option>
                                        <option value="2029">2029</option>
                                        <option value="2030">2030</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Residence -->
                            <div class="mt-5">
                                <label class="form-label fw-medium">Residence Type</label>
                                <div class="row g-3">
                                    <div class="col-auto">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="residence" id="dayScholar" value="day" required>
                                            <label class="form-check-label" for="dayScholar">Day Scholar</label>
                                        </div>
                                    </div>
                                    <div class="col-auto">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="residence" id="hosteler" value="hostel" required>
                                            <label class="form-check-label" for="hosteler">Hosteller</label>
                                        </div>
                                    </div>
                                </div>
                                <div id="hostelBlockField" class="mt-3 d-none">
                                    <label class="form-label fw-medium">Hostel Block</label>
                                    <select class="form-select input-focus" id="hostelBlock">
                                        <option value="">Select Block</option>
                                        <option value="1">Block 1</option>
                                        <option value="2">Block 2</option>
                                        <option value="3">Block 3</option>
                                        <option value="4">Block 4</option>
                                        <option value="s">Special Block</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Subjects -->
                            <div class="mt-5">
                                <h4 class="mb-3 text-teal-700 d-flex align-items-center gap-2">
                                    <i class="fa-solid fa-book-open"></i>Choose Subjects for Session 2026-27
                                </h4>
                                <p class="text-muted small">Select all applicable subjects</p>
                                <div id="subjectsContainer" class="row g-3"></div>
                            </div>

                            <!-- Agreement -->
                            <div class="form-check mt-5">
                                <input class="form-check-input" type="checkbox" id="agreement" required>
                                <label class="form-check-label text-muted" for="agreement">
                                    I hereby declare that the information provided above is true and correct to the best of my knowledge.
                                </label>
                            </div>
                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-lg w-100 mt-5 py-3 fw-semibold text-white"
                                    style="background: linear-gradient(90deg, #14b8a6, #22d3ee); border: none;">
                                <i class="fa-solid fa-paper-plane me-2"></i> SUBMIT REGISTRATION
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Thank You -->
    <div class="modal fade" id="thankYouModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body text-center p-5">
                    <div class="mx-auto w-20 h-20 bg-teal-500 bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mb-4">
                        <i class="fa-solid fa-check-circle text-teal-400 fa-4x"></i>
                    </div>
                    <h2 class="header-font display-6 fw-bold text-white mb-3">Registration Successful!</h2>
                    <p class="text-teal-100 mb-4">
                        Thank you for completing your semester registration.<br>
                        Your details have been submitted successfully.
                    </p>
                    <button onclick="resetForm()" class="btn btn-outline-light w-100 py-3">
                        REGISTER ANOTHER STUDENT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS + Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js" > </script>
  </body>
  </html>
